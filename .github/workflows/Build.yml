name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0

    - name: Setup Java (required by SonarCloud)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar

    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Begin SonarCloud analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet sonarscanner begin \
        /k:"saikatkrroy_24e2a906-733f-4edb-abd1-c9fe871d60d7" \
        /o:"saikatkrroy" \
        /d:sonar.token="$SONAR_TOKEN" \
        /d:sonar.host.url="https://sonarcloud.io"
    - name: Restore dependencies
      run: dotnet restore PatternFinder.csproj

    - name: Build Project
      run: dotnet build PatternFinder.csproj --no-restore
    - name: Run Unit Tests
      run: dotnet test PatternFinder.Test.csproj
    - name: End SonarCloud analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
